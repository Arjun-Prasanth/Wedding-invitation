<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#fff5f7;
text-align:center;
overflow-x:hidden;
}

/* Curtain Section */

#curtain-container{
position:fixed;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
}

.curtain{
position:absolute;
width:50%;
height:100%;
background:#a8002a;
transition:2s;
}

.left{
left:0;
}

.right{
right:0;
}

#openBtn{
position:relative;
z-index:20;
padding:15px 35px;
font-size:20px;
background:white;
border:none;
border-radius:30px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* After opening */

.open .left{
transform:translateX(-100%);
}

.open .right{
transform:translateX(100%);
}

section{
padding:100px 20px;
}

/* Couple title */

.couple{
font-family:'Great Vibes';
font-size:60px;
color:#c2185b;
}

.subtitle{
font-size:28px;
margin-top:10px;
}

/* Scratch cards */

.scratch-container{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-top:50px;
}

canvas{
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* Location */

.location{
font-size:30px;
color:#8e0038;
}

/* Footer */

.footer{
font-size:22px;
margin-top:40px;
color:#444;
}

</style>
</head>


<body>


<div id="curtain-container">

<div class="curtain left"></div>
<div class="curtain right"></div>

<button id="openBtn">Click to Open Invitation ❤</button>

</div>



<section id="hero">

<div class="couple">Aashoohh & Ajoooohh</div>

<div class="subtitle">
are getting married
</div>

</section>



<section>

<h2>Scratch to reveal the date</h2>

<div class="scratch-container">

<canvas id="scratch1" width="200" height="120"></canvas>
<canvas id="scratch2" width="200" height="120"></canvas>
<canvas id="scratch3" width="200" height="120"></canvas>

</div>

</section>



<section>

<h2>Venue</h2>

<div class="location">
Wasava Cliff House
</div>

</section>



<section>

<div class="footer">
With love in our hearts ❤️ <br>
We cordially invite you to celebrate our wedding.
</div>

</section>




<script>

// Curtain open

document.getElementById("openBtn").onclick = function(){

document.body.classList.add("open");

setTimeout(()=>{
document.getElementById("curtain-container").style.display="none";
},2000);

}




function createScratch(canvasId,text){

let canvas=document.getElementById(canvasId);
let ctx=canvas.getContext("2d");

ctx.fillStyle="#c2185b";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.font="25px Poppins";
ctx.fillStyle="white";
ctx.textAlign="center";
ctx.fillText("Scratch Here",100,65);

ctx.globalCompositeOperation="destination-out";

canvas.addEventListener("mousemove",function(e){

if(e.buttons===1){

let rect=canvas.getBoundingClientRect();

let x=e.clientX-rect.left;
let y=e.clientY-rect.top;

ctx.beginPath();
ctx.arc(x,y,15,0,Math.PI*2);
ctx.fill();

}

});

let reveal=document.createElement("div");
reveal.innerHTML=text;
reveal.style.fontSize="28px";
reveal.style.marginTop="-90px";
reveal.style.pointerEvents="none";

canvas.parentElement.appendChild(reveal);

}



createScratch("scratch1","Saturday");
createScratch("scratch2","December 26");
createScratch("scratch3","2026");

</script>


</body>
</html>
