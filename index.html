<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#fff5f7;
text-align:center;
overflow-x:hidden;
}

/* CURTAIN */

#curtain-container{
position:fixed;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
background:#300;
}

.curtain{
position:absolute;
width:50%;
height:100%;
background:
linear-gradient(
90deg,
#7a001e 0%,
#a8002a 20%,
#7a001e 40%,
#a8002a 60%,
#7a001e 80%
);
box-shadow:inset -10px 0 30px rgba(0,0,0,0.5);
transition:2.5s ease;
}

.left{
left:0;
}

.right{
right:0;
}

#openBtn{
position:relative;
z-index:20;
padding:16px 40px;
font-size:20px;
background:white;
border:none;
border-radius:30px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

/* Curtain open animation */

.open .left{
transform:translateX(-100%);
}

.open .right{
transform:translateX(100%);
}


/* Sections */

section{
padding:120px 20px;
}

/* Couple names */

.couple{
font-family:'Great Vibes';
font-size:65px;
color:#c2185b;
}

.subtitle{
font-size:28px;
margin-top:10px;
}

/* Scratch cards */

.scratch-container{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-top:60px;
}

.card{
position:relative;
width:200px;
height:120px;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

.reveal{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:500;
color:#a8002a;
background:white;
}

canvas{
position:absolute;
top:0;
left:0;
}

/* Location */

.location{
font-size:30px;
color:#8e0038;
}

/* Footer */

.footer{
font-size:22px;
margin-top:40px;
color:#444;
}

</style>
</head>



<body>

<div id="curtain-container">

<div class="curtain left"></div>
<div class="curtain right"></div>

<button id="openBtn">Open Invitation ❤</button>

</div>



<section>

<div class="couple">Aashoohh & Ajoooohh</div>

<div class="subtitle">
are getting married
</div>

</section>



<section>

<h2>Scratch to reveal the date</h2>

<div class="scratch-container">

<div class="card">
<div class="reveal">Saturday</div>
<canvas width="200" height="120"></canvas>
</div>

<div class="card">
<div class="reveal">December 26</div>
<canvas width="200" height="120"></canvas>
</div>

<div class="card">
<div class="reveal">2026</div>
<canvas width="200" height="120"></canvas>
</div>

</div>

</section>



<section>

<h2>Venue</h2>

<div class="location">
Wasava Cliff House
</div>

</section>



<section>

<div class="footer">
With love in our hearts ❤️ <br>
We cordially invite you to celebrate our wedding.
</div>

</section>



<script>

/* Curtain open */

document.getElementById("openBtn").onclick = function(){

document.body.classList.add("open");

setTimeout(()=>{
document.getElementById("curtain-container").style.display="none";
},2500);

}



/* Scratch cards */

document.querySelectorAll("canvas").forEach(canvas=>{

let ctx=canvas.getContext("2d");

ctx.fillStyle="#c2185b";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.font="20px Poppins";
ctx.fillStyle="white";
ctx.textAlign="center";
ctx.fillText("Scratch Here",100,65);

ctx.globalCompositeOperation="destination-out";

canvas.addEventListener("mousemove",function(e){

if(e.buttons===1){

let rect=canvas.getBoundingClientRect();

let x=e.clientX-rect.left;
let y=e.clientY-rect.top;

ctx.beginPath();
ctx.arc(x,y,18,0,Math.PI*2);
ctx.fill();

}

});

});

</script>


</body>
</html>
